<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>KKBOX — Login Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
      :root{--bg:#0f0f0f;--card:#262626;--accent:#14c8ef;--muted:#bdbdbd}
      *{box-sizing:border-box}
      html,body{height:100%}
      body{margin:0;font-family:'Noto Sans TC',system-ui,-apple-system,'Segoe UI',Roboto,Arial;background:var(--bg);color:#fff;display:flex;align-items:center;justify-content:center}
      .page{width:100%;max-width:1100px;padding:48px;display:flex;gap:36px;align-items:flex-start;justify-content:center}
      .login-card{width:320px;background:var(--card);padding:28px;border-radius:12px;box-shadow:0 18px 30px rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.03)}
      .login-logo{font-size:32px;font-weight:800;color:var(--accent);text-align:center}
      .login-logo .slogan{display:block;font-size:12px;font-weight:400;color:var(--muted);margin-top:6px}
      .login-form{margin-top:18px;display:flex;flex-direction:column;gap:12px}
      .login-form label{font-size:12px;color:var(--muted)}
      .login-form input{padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:#fff}
      .login-form .error{color:#ff6b6b;font-size:12px;margin-top:6px;display:none}
      .login-form input[aria-invalid="true"]{border-color:#ff6b6b;box-shadow:0 0 0 4px rgba(255,107,107,0.06)}
      .login-cta{display:flex;flex-direction:column;gap:12px;margin-top:12px}
      .btn{display:inline-block;text-align:center;padding:12px 16px;border-radius:28px;border:0;cursor:pointer;font-weight:700}
      .btn.signup{background:var(--accent);color:#012226}
      .btn.outline{background:transparent;border:1px solid rgba(20,200,239,0.6);color:#bfefff}
      /* cloned variant slightly offset */
      .login-card.clone{transform:translateY(18px) scale(.99);opacity:.98}
      /* small-screen: stack */
      @media (max-width:880px){.page{flex-direction:column;align-items:center;padding:18px}.login-card{width:100%;max-width:420px}}

      /* Custom modal (dark themed) */
      .modal-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:60;opacity:0;pointer-events:none;transition:opacity .18s ease}
      .modal-overlay[aria-hidden="false"]{opacity:1;pointer-events:auto}
      .modal{background:var(--card);color:#fff;padding:20px;border-radius:12px;width:min(560px,94%);box-shadow:0 20px 40px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.04);position:relative}
      .modal .modal-content{font-size:15px;color:#e6f9ff;line-height:1.4}
      .modal .modal-actions{margin-top:18px;display:flex;justify-content:flex-end;gap:12px}
      .modal-close{position:absolute;top:10px;right:10px;background:transparent;color:var(--muted);border:0;font-size:20px;cursor:pointer}
      @media (max-width:480px){.modal{padding:14px}}
    </style>
  </head>
  <body>
    <main class="page" role="main">
      <section class="login-card" aria-label="KKBOX Login - English">
        <div class="login-logo">KKBOX <span class="slogan">Listen, and Be Heard.</span></div>
        <form class="login-form" action="#" method="post" novalidate>
          <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="name@example.com" aria-describedby="emailError">
            <div id="emailError" class="error" role="alert" aria-live="assertive"></div>
          </div>
          <div>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Enter your password" aria-describedby="passwordError">
            <div id="passwordError" class="error" role="alert" aria-live="assertive"></div>
          </div>
          <div class="login-cta">
            <button id="loginBtn" class="btn signup" type="button">Login</button>
          </div>
        </form>
      </section>

      <!-- English-only login card retained -->
    </main>
    <script>
      (function(){
        const loginBtn = document.getElementById('loginBtn');
        const email = document.getElementById('email');
        const password = document.getElementById('password');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');

        function showFieldError(inputEl, errEl, msg){
          inputEl.setAttribute('aria-invalid','true');
          errEl.textContent = msg;
          errEl.style.display = 'block';
        }

        function clearFieldError(inputEl, errEl){
          inputEl.removeAttribute('aria-invalid');
          errEl.textContent = '';
          errEl.style.display = 'none';
        }

        // modal elements and helper functions
        const modalOverlay = document.getElementById('customModal');
        const modalMessage = document.getElementById('customModalMessage');
        const modalClose = document.getElementById('modalClose');
        const modalOk = document.getElementById('modalOk');

        function showCustomModal(msg){
          if(modalMessage) modalMessage.textContent = msg;
          if(modalOverlay) modalOverlay.setAttribute('aria-hidden','false');
          if(modalOk) modalOk.focus();
        }

        function hideCustomModal(){
          if(modalOverlay) modalOverlay.setAttribute('aria-hidden','true');
        }

        // modal event listeners
        if(modalClose) modalClose.addEventListener('click', hideCustomModal);
        if(modalOk) modalOk.addEventListener('click', hideCustomModal);
        if(modalOverlay) modalOverlay.addEventListener('click', function(e){ if(e.target === modalOverlay) hideCustomModal(); });
        document.addEventListener('keydown', function(e){ if(e.key === 'Escape') hideCustomModal(); });

        if(loginBtn){
          loginBtn.addEventListener('click', function(e){
            let hadError = false;
            // clear previous
            clearFieldError(email, emailError);
            clearFieldError(password, passwordError);

            if(!email.value.trim()){
              showFieldError(email, emailError, 'Please fill your email.');
              if(!hadError){ email.focus(); }
              hadError = true;
            }
            if(!password.value.trim()){
              showFieldError(password, passwordError, 'Please fill your password.');
              if(!hadError){ password.focus(); }
              hadError = true;
            }

            if(hadError){
              e.preventDefault();
              return;
            }

            // show custom modal instead of native alert
            showCustomModal("Objective Complete! Thanks for the credentials. Don't worry, I'll only use your account to play 'Baby Shark' on repeat 24/7. Stay vigilant next time! 🦈😈");
          });

          // remove error state when user types
          email.addEventListener('input', ()=> clearFieldError(email, emailError));
          password.addEventListener('input', ()=> clearFieldError(password, passwordError));
        }
      })();
    </script>
    <!-- Custom modal HTML (place at end of body) -->
    <div id="customModal" class="modal-overlay" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="modal" role="document">
        <button id="modalClose" class="modal-close" aria-label="Close">✕</button>
        <div id="customModalMessage" class="modal-content">Message</div>
        <div class="modal-actions">
          <button id="modalOk" class="btn signup">OK</button>
        </div>
      </div>
    </div>
  </body>
</html>
